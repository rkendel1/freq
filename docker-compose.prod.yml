---
# Production-ready Docker Compose configuration for Freqtrade
# This configuration includes best practices for production deployment:
# - Resource limits and reservations
# - Health checks
# - Restart policies
# - Security enhancements
# - Monitoring integration
# - Data persistence

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade-prod
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '${DOCKER_CPU_LIMIT:-4.0}'
          memory: ${DOCKER_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${DOCKER_CPU_RESERVATION:-2.0}'
          memory: ${DOCKER_MEMORY_RESERVATION:-2G}
    
    # Health check
    healthcheck:
      test: ["CMD", "freqtrade", "show-config", "--config", "/freqtrade/user_data/config.json"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    
    # Environment variables
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TZ=${TZ:-UTC}
      - FREQTRADE_MODE=${FREQTRADE_MODE:-live}
    
    # Environment file (for non-sensitive configs)
    env_file:
      - .env
    
    # Volumes - named volumes for better management
    volumes:
      # Configuration (read-only for security)
      - ./user_data/config.json:/freqtrade/user_data/config.json:ro
      # Strategies (read-only in production)
      - ./user_data/strategies:/freqtrade/user_data/strategies:ro
      # Data persistence
      - freqtrade-data:/freqtrade/user_data/data
      # Logs
      - freqtrade-logs:/freqtrade/user_data/logs
      # Database
      - freqtrade-db:/freqtrade/user_data
    
    # Tmpfs for better performance
    tmpfs:
      - /tmp:size=512M
      - /freqtrade/user_data/tmp:size=256M
    
    # Network configuration
    networks:
      - freqtrade-network
    
    # Port binding (localhost only for security)
    ports:
      - "${BIND_HOST:-127.0.0.1}:${FREQTRADE_API_PORT:-8080}:8080"
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: false  # Set to true if supported by your setup
    
    # Default command
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url ${DB_URL:-sqlite:////freqtrade/user_data/tradesv3.sqlite}
      --config /freqtrade/user_data/config.json
      --strategy ${FREQTRADE_STRATEGY:-SampleStrategy}

  # PostgreSQL Database (optional, recommended for production)
  postgresql:
    image: postgres:16-alpine
    container_name: freqtrade-postgres
    restart: unless-stopped
    profiles:
      - postgres
    
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-freqtrade}
      - POSTGRES_USER=${POSTGRES_USER:-freqtrade}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-freqtrade-password}
    
    volumes:
      - postgres-data:/var/lib/postgresql/data
    
    networks:
      - freqtrade-network
    
    # Internal only - no port exposure
    expose:
      - 5432
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freqtrade}"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Redis Cache (optional, for performance)
  redis:
    image: redis:7-alpine
    container_name: freqtrade-redis
    restart: unless-stopped
    profiles:
      - cache
    
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis-password}
    
    volumes:
      - redis-data:/data
    
    networks:
      - freqtrade-network
    
    expose:
      - 6379
    
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Prometheus Monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: freqtrade-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}'
    
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    networks:
      - freqtrade-network
    
    ports:
      - "${BIND_HOST:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Grafana Dashboard (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: freqtrade-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    
    networks:
      - freqtrade-network
    
    ports:
      - "${BIND_HOST:-127.0.0.1}:3000:3000"
    
    depends_on:
      - prometheus
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# Named volumes for data persistence
volumes:
  freqtrade-data:
    driver: local
  freqtrade-logs:
    driver: local
  freqtrade-db:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# Network configuration
networks:
  freqtrade-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.28.0.0/16}
