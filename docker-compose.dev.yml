---
# Docker Compose configuration for Freqtrade Development Environment
# Single-container setup with all services included
#
# Quick start:
#   docker compose -f docker-compose.dev.yml up
#
# With custom environment:
#   docker compose -f docker-compose.dev.yml --env-file docker/.env up
#
# Build and run:
#   docker compose -f docker-compose.dev.yml up --build

services:
  freqtrade-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: freqtrade-dev
    restart: unless-stopped
    
    # Port mappings
    ports:
      - "5000:5000"   # Demo UI
      - "8501:8501"   # Configuration Dashboard (Streamlit)
      - "8502:8502"   # Monitoring Dashboard (Streamlit)
    
    # Persistent data volume
    volumes:
      - ./user_data:/freqtrade/user_data
      # Optional: Mount custom ExploitModules
      # - ./custom_exploits:/freqtrade/custom_exploits:ro
      # Optional: Mount custom strategies
      # - ./custom_strategies:/freqtrade/user_data/strategies:ro
    
    # Environment variables
    environment:
      # Core settings
      - DRY_RUN=${DRY_RUN:-true}
      - INITIAL_CAPITAL=${INITIAL_CAPITAL:-10000.0}
      - EXCHANGE_NAME=${EXCHANGE_NAME:-binance}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # Security - IMPORTANT: Set this in production!
      - STREAMLIT_PASSWORD=${STREAMLIT_PASSWORD:-}
      
      # Optional: QuestDB connection (for future use)
      # - QUESTDB_HOST=${QUESTDB_HOST:-questdb}
      # - QUESTDB_PORT=${QUESTDB_PORT:-9000}
      # - QUESTDB_ENABLED=${QUESTDB_ENABLED:-false}
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

