# Render Blueprint for Freqtrade Execution Engine
# https://render.com/docs/blueprint-spec
#
# ⚠️ CRITICAL: This MUST run as a Docker service
# If you see "No open ports detected" error, the service is misconfigured as Python
# See RENDER_FIX.md for instructions to fix this

services:
  # Main application service - Docker container with all services
  # IMPORTANT: env must be "docker" - do NOT change to python/node/etc
  - type: web
    name: freqtrade-app
    env: docker                        # REQUIRED: Must be "docker"
    dockerfilePath: ./Dockerfile.dev   # Path to Dockerfile
    dockerContext: .                   # Build context (repository root)
    
    # Auto-deploy from main branch
    branch: main
    
    # Health check endpoint
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      # Core settings
      - key: DRY_RUN
        value: true
      
      - key: INITIAL_CAPITAL
        value: 10000.0
      
      - key: EXCHANGE_NAME
        value: binance
      
      - key: LOG_LEVEL
        value: INFO
      
      # Note: PORT is automatically provided by Render
      # No need to define it here - Render assigns it dynamically
      
      # Security - IMPORTANT: Set this in Render dashboard!
      # Render's generateValue creates a secure random password
      # For production: Set a custom strong password via Render dashboard
      # Requirements: Minimum 12 characters, mix of letters, numbers, symbols
      - key: STREAMLIT_PASSWORD
        generateValue: true
      
      # Process settings
      - key: PROCESS_THROTTLE_SECS
        value: 5
      
      # QuestDB integration (disabled by default)
      - key: QUESTDB_ENABLED
        value: false
      
      # Monitor refresh settings
      - key: MONITOR_REFRESH_INTERVAL
        value: 10
      
      - key: MAX_LOG_LINES
        value: 500
    
    # Persistent disk for user data, database, logs
    disk:
      name: user-data
      mountPath: /freqtrade/user_data
      sizeGB: 1
    
    # Resource allocation
    # Free tier: 512MB RAM, 0.1 CPU
    # Starter: 2GB RAM, 1 CPU (recommended)
    plan: starter
    
    # Region
    region: oregon
    
    # Build settings
    # This is the CMD that runs inside the Docker container
    # Do NOT change this - it starts supervisord which manages all services
    dockerCommand: supervisord -c /etc/supervisor/supervisord.conf
    
    # Auto-deploy on push
    autoDeploy: true

